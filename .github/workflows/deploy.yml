name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail

            cd ~/h1bfriend

            git fetch origin main
            git reset --hard origin/main

            docker compose run --rm migrate
            docker compose up -d --build

            curl --fail --silent --show-error http://127.0.0.1:8089/health >/dev/null
            curl --fail --silent --show-error --insecure https://h1bfriend.com/api/v1/meta/years >/dev/null
